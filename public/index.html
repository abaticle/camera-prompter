<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinePrompter - Cinema Shot Prompt Generator</title>
  
  <!-- Premium Cinematic Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Shoelace Dark Theme CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/themes/dark.css" />
  
  <!-- Shoelace Full Library (Registers all components globally for Shadow DOM support) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/shoelace.js"></script>

  <!-- Application Styles and Background Animation -->
  <style>
    :root {
      --primary-glow: rgba(229, 9, 20, 0.15); /* Netflix-like red glow */
      --secondary-glow: rgba(0, 242, 254, 0.1); /* Anamorphic blue streak flare glow */
      --cinema-bg: #090a0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--cinema-bg);
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Ambient Cinema Projection Lighting Background Effect */
    body::before {
      content: '';
      position: absolute;
      top: -10%;
      left: 10%;
      width: 80%;
      height: 60%;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      animation: project-light 10s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: 10%;
      width: 70%;
      height: 50%;
      background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      animation: project-light-blue 14s ease-in-out infinite alternate;
    }

    @keyframes project-light {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate(100px, 50px) scale(1.2);
        opacity: 1;
      }
    }

    @keyframes project-light-blue {
      0% {
        transform: translate(0, 0) scale(1.1);
        opacity: 0.7;
      }
      100% {
        transform: translate(-80px, -40px) scale(0.9);
        opacity: 0.9;
      }
    }

    cine-prompter {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      min-height: 100vh;
    }
  </style>

  <!-- Load Lit Application Component -->
  <script type="module" src="/app.js"></script>
</head>
<body class="sl-theme-dark">

  <!-- Main Lit Application Component -->
  <cine-prompter id="main-app"></cine-prompter>

</body>
</html>
